<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - Islamic University of Kenya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #5cb85c;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #4cae4c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event Registration</h1>
        <form id="eventRegistrationForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="event">Select Event:</label>
                <select id="event" required>
                    <option value="graduation">Graduation Ceremony</option>
                    <option value="football">Football Games</option>
                    <option value="welcoming">Welcoming Ceremony</option>
                </select>
            </div>
            <button type="submit">Register</button>
        </form>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR-API-KEY",
            authDomain: "YOUR-APP.firebaseapp.com",
            databaseURL: "https://YOUR-APP.firebaseio.com",
            projectId: "YOUR-APP",
            storageBucket: "YOUR-APP.appspot.com",
            messagingSenderId: "YOUR-SENDER-ID",
            appId: "YOUR-APP-ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        const database = firebase.database();
        const form = document.getElementById('eventRegistrationForm');

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const selectedEvent = document.getElementById('event').value;

            // Save registration to Firebase
            database.ref('registrations/').push({
                name,
                email,
                selectedEvent
            }).then(() => {
                alert('Registration successful!');
                form.reset();
            }).catch((error) => {
                alert('Error: ' + error.message);
            });
        });
    </script>
</body>
</html>
